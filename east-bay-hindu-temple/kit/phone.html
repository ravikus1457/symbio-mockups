<!doctype html><meta charset=utf-8><style>
*{margin:0;box-sizing:border-box}
body{width:760px;height:1180px;background:radial-gradient(circle at 50% 30%,#fff3dd,#fff8ee);
 display:flex;align-items:center;justify-content:center;font-family:sans-serif}
.phone{width:392px;height:812px;background:#111;border-radius:54px;padding:14px;
 box-shadow:0 30px 70px #0004, inset 0 0 0 2px #333}
.screen{width:100%;height:100%;border-radius:42px;overflow:hidden;position:relative;background:#fff}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;
 background:#111;border-radius:0 0 16px 16px;z-index:2}
.screen img{width:100%;display:block}
</style><div class=phone><div class=screen><div class=notch></div>
<img src=phone-shot.png></div></div>
